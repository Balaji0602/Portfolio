name: Deploy to S3 (CD)

on:
  push:
    branches:
      - main

concurrency:
  group: "production-deployment"
  cancel-in-progress: false

permissions:
  id-token: write 
  contents: read

jobs:
  build_and_deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ./balag-portfolio

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './balag-portfolio/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        # Uncomment and add secrets if your build requires environment variables (e.g., API URLs for Vite/React)
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Deploy static assets to S3 (Cache forever)
        run: aws s3 sync dist/ s3://${{ secrets.AWS_S3_BUCKET }} --exclude "index.html" --delete --cache-control "max-age=31536000, public"

      - name: Deploy index.html to S3 (No cache)
        run: aws s3 cp dist/index.html s3://${{ secrets.AWS_S3_BUCKET }}/index.html --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*" --wait
