name: Build Check (CI)

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build_and_test:
    name: Build & Lint Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ./balag-portfolio

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './balag-portfolio/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      # Uncomment the following step if you add a test suite (e.g., Jest, Vitest)
      # - name: Run Tests
      #   run: npm run test

      - name: Build Application
        run: npm run build
